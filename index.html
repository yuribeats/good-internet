<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE GOOD INTERNET</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      background: #fff;
      color: #000;
      padding: 20px;
    }
    a { color: #000; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      border-bottom: 1px solid #000;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }
    h1 { font-size: 48px; font-weight: 900; letter-spacing: 2px; }
    .project-list { display: flex; flex-direction: column; }
    .project {
      border: 1px solid #000;
      padding: 16px;
      margin-bottom: -1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .project-left { flex: 1; min-width: 0; }
    .project-name { font-size: 18px; font-weight: 900; }
    .project-desc {
      font-size: 11px;
      font-weight: 900;
      color: #666;
      margin-top: 4px;
    }
    .project-links {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 900;
    }
    .project-links a { color: #666; }
    .project-links a:hover { color: #000; }
    .empty {
      padding: 40px;
      text-align: center;
      border: 1px solid #000;
      font-size: 14px;
    }
    .loading { padding: 40px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <h1>THE GOOD INTERNET</h1>
  </header>

  <div id="projects" class="project-list">
    <div class="loading">LOADING...</div>
  </div>

  <script>
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    fetch('/api/projects').then(function(r) { return r.json(); }).then(function(data) {
      var projects = (data.projects || []).sort(function(a, b) {
        return (b.timestamp || 0) - (a.timestamp || 0);
      });
      var el = document.getElementById('projects');

      if (projects.length === 0) {
        el.innerHTML = '<div class="empty">NO PROJECTS YET</div>';
        return;
      }

      el.innerHTML = projects.map(function(p) {
        var desc = p.description ? '<div class="project-desc">' + esc(p.description) + '</div>' : '';
        var links = '<a href="' + esc(p.url) + '" target="_blank">' + esc(p.url.replace(/^https?:\/\//, '')) + '</a>';
        if (p.github) {
          links += '<a href="' + esc(p.github) + '" target="_blank">GITHUB</a>';
        }
        return '<div class="project">' +
          '<div class="project-left">' +
            '<a href="' + esc(p.url) + '" target="_blank" class="project-name">' + esc(p.name) + '</a>' +
            desc +
          '</div>' +
          '<div class="project-links">' + links + '</div>' +
        '</div>';
      }).join('');
    }).catch(function() {
      document.getElementById('projects').innerHTML =
        '<div class="empty">COULD NOT LOAD PROJECTS</div>';
    });
  </script>
</body>
</html>
