<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta property="og:description" content="Yuri Rybak — software developer, music producer, and creative technologist. Projects, work, and links.">
  <meta property="og:url" content="https://thegoodinternet.app/">
  <meta property="og:site_name" content="THE GOOD INTERNET">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="YURI RYBAK — THE GOOD INTERNET">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Yuri Rybak",
    "url": "https://thegoodinternet.app",

  }

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "THE GOOD INTERNET",
    "url": "https://thegoodinternet.app",
    "author": {
      "@type": "Person",
      "name": "Yuri Rybak"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      background: #fff;
      color: #000;
      padding: 20px;
    }
    a { color: #000; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      border-bottom: 1px solid #000;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }
    h1 { font-size: 48px; font-weight: 900; letter-spacing: 2px; }
    .byline { font-size: 14px; font-weight: 900; margin-top: 8px; color: #666; }
    .project-list { display: flex; flex-direction: column; }
    .project {
      border: 1px solid #000;
      padding: 16px;
      margin-bottom: -1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .project-img { width: 60px; height: 60px; object-fit: cover; border: 1px solid #000; flex-shrink: 0; }
    .project-left { flex: 1; min-width: 0; }
    .project-name { font-size: 18px; font-weight: 900; }
    .project-desc {
      font-size: 11px;
      font-weight: 900;
      color: #666;
      margin-top: 4px;
    }
    .project-links {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 900;
    }
    .project-links a { color: #666; }
    .project-links a:hover { color: #000; }
    .empty {
      padding: 40px;
      text-align: center;
      border: 1px solid #000;
      font-size: 14px;
    }
    .loading { padding: 40px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <h1>THE GOOD INTERNET</h1>
    <p class="byline">BY YURI RYBAK</p>
  </header>

  <main>
    <div id="projects" class="project-list">
      <div class="loading">LOADING...</div>
    </div>
  </main>

  <script>
    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    fetch('/api/projects').then(function(r) { return r.json(); }).then(function(data) {
      var projects = (data.projects || []).sort(function(a, b) {
        return (b.timestamp || 0) - (a.timestamp || 0);
      });
      var el = document.getElementById('projects');

      if (projects.length === 0) {
        el.innerHTML = '<div class="empty">NO PROJECTS YET</div>';
        return;
      }

      el.innerHTML = projects.map(function(p) {
        var desc = p.description ? '<div class="project-desc">' + esc(p.description) + '</div>' : '';
        var links = '<a href="' + esc(p.url) + '" target="_blank">' + esc(p.url.replace(/^https?:\/\//, '')) + '</a>';
        if (p.github) {
          links += '<a href="' + esc(p.github) + '" target="_blank">GITHUB</a>';
        }
        var img = p.image ? '<img src="' + esc(p.image) + '" class="project-img" alt="' + esc(p.name) + '">' : '';
        return '<article class="project">' +
          img +
          '<div class="project-left">' +
            '<a href="' + esc(p.url) + '" target="_blank" class="project-name">' + esc(p.name) + '</a>' +
            desc +
          '</div>' +
          '<div class="project-links">' + links + '</div>' +
        '</article>';
      }).join('');
    }).catch(function() {
      document.getElementById('projects').innerHTML =
        '<div class="empty">COULD NOT LOAD PROJECTS</div>';
    });
  </script>
</body>
</html>
