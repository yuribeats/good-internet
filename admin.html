<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN — THE GOOD INTERNET</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      background: #fff;
      color: #000;
      padding: 20px;
    }
    a { color: #000; }
    header {
      border-bottom: 1px solid #000;
      padding-bottom: 20px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    h1 { font-size: 32px; font-weight: 900; letter-spacing: 2px; }
    .back-link { font-size: 12px; font-weight: 900; letter-spacing: 1px; }
    .count { font-size: 12px; margin-bottom: 20px; }

    .add-form {
      border: 1px solid #000;
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .add-form .field { flex: 1; min-width: 150px; }
    .add-form label { display: block; font-size: 10px; margin-bottom: 4px; }
    .add-form input, .add-form textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #000;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 12px;
      text-transform: uppercase;
      outline: none;
      background: #fff;
      color: #000;
      resize: vertical;
    }
    .add-form input:focus, .add-form textarea:focus { background: #000; color: #fff; }
    .btn {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      padding: 8px 16px;
      border: 1px solid #000;
      background: #000;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }
    .btn:hover { background: #fff; color: #000; }
    .btn-outline {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      padding: 8px 16px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-outline:hover { background: #000; color: #fff; }

    .project {
      border: 1px solid #000;
      padding: 16px;
      margin-bottom: -1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .project-info { flex: 1; min-width: 0; }
    .project-name { font-size: 16px; font-weight: 900; margin-bottom: 2px; }
    .project-url { font-size: 11px; color: #666; word-break: break-all; }
    .project-desc { font-size: 10px; color: #444; margin-top: 4px; }
    .project-github { font-size: 10px; color: #666; margin-top: 2px; }
    .project-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .project-img { width: 60px; height: 60px; object-fit: cover; border: 1px solid #000; flex-shrink: 0; }

    .img-upload { display: none; }
    .img-label {
      display: inline-block;
      padding: 8px 16px;
      border: 1px solid #000;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      cursor: pointer;
      background: #fff;
      color: #000;
    }
    .img-label:hover { background: #000; color: #fff; }
    .img-preview { height: 40px; margin-top: 4px; border: 1px solid #000; }
    .img-row { display: flex; align-items: center; gap: 8px; }
    .img-clear {
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 9px;
      text-transform: uppercase;
      padding: 4px 8px;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      cursor: pointer;
    }
    .img-clear:hover { background: #000; color: #fff; }

    .edit-row {
      border: 1px solid #000;
      padding: 16px;
      margin-bottom: -1px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #f5f5f5;
    }
    .edit-fields { display: flex; gap: 8px; flex-wrap: wrap; }
    .edit-row .field { flex: 1; min-width: 150px; }
    .edit-row label { display: block; font-size: 10px; margin-bottom: 4px; }
    .edit-row input, .edit-row textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #000;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 12px;
      text-transform: uppercase;
      outline: none;
      background: #fff;
      color: #000;
      resize: vertical;
    }
    .edit-row input:focus, .edit-row textarea:focus { background: #000; color: #fff; }
    .edit-actions { display: flex; gap: 4px; }

    .empty {
      padding: 40px;
      text-align: center;
      border: 1px solid #000;
      font-size: 14px;
    }
    .gate {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gate-box { text-align: center; }
    .gate-input {
      width: 240px;
      padding: 10px;
      border: 1px solid #000;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      text-align: center;
      outline: none;
      background: #fff;
      color: #000;
    }
    .gate-input:focus { background: #000; color: #fff; }
    .gate-btn {
      display: block;
      width: 240px;
      margin-top: 12px;
      padding: 10px;
      border: 1px solid #000;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 14px;
      text-transform: uppercase;
      cursor: pointer;
    }
    .gate-btn:hover { background: #fff; color: #000; }
    .gate-error { margin-top: 12px; font-size: 11px; color: #999; height: 16px; }
    .content { display: none; }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate-box">
      <input type="password" class="gate-input" id="passInput" placeholder="PASSWORD" autocomplete="off">
      <button class="gate-btn" id="passBtn">ENTER</button>
      <div class="gate-error" id="passError"></div>
    </div>
  </div>

  <div class="content" id="content">
    <header>
      <h1>ADMIN</h1>
      <a href="/" class="back-link">&larr; BACK</a>
    </header>

    <div class="add-form">
      <div class="add-row">
        <div class="field">
          <label>NAME</label>
          <input type="text" id="addName" placeholder="PROJECT NAME">
        </div>
        <div class="field">
          <label>URL</label>
          <input type="url" id="addUrl" placeholder="HTTPS://...">
        </div>
        <div class="field">
          <label>GITHUB</label>
          <input type="url" id="addGithub" placeholder="HTTPS://GITHUB.COM/...">
        </div>
      </div>
      <div class="field">
        <label>DESCRIPTION</label>
        <textarea id="addDesc" rows="2" placeholder="SHORT DESCRIPTION..."></textarea>
      </div>
      <div class="img-row">
        <div class="field">
          <label>IMAGE</label>
          <input type="file" accept="image/*" class="img-upload" id="addImage">
          <label for="addImage" class="img-label" id="addImageLabel">CHOOSE IMAGE</label>
        </div>
        <img id="addImagePreview" style="display:none" class="img-preview">
        <button type="button" id="addImageClear" class="img-clear" style="display:none">CLEAR</button>
      </div>
      <button class="btn" id="addBtn">ADD</button>
    </div>

    <div class="count" id="count"></div>
    <div id="projects"></div>
  </div>

  <script>
    document.getElementById('passBtn').addEventListener('click', checkPass);
    document.getElementById('passInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPass();
    });
    document.getElementById('passInput').focus();

    function checkPass() {
      if (document.getElementById('passInput').value.toLowerCase() === '5fn5fn') {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        load();
      } else {
        document.getElementById('passError').textContent = 'WRONG PASSWORD';
        document.getElementById('passInput').value = '';
        document.getElementById('passInput').focus();
      }
    }

    var projects = [];
    var editingIndex = -1;
    var addImageData = '';
    var editImageData = null;

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function resizeImage(file, maxW, cb) {
      var reader = new FileReader();
      reader.onload = function(e) {
        var img = new Image();
        img.onload = function() {
          var w = img.width, h = img.height;
          if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
          var c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          cb(c.toDataURL('image/jpeg', 0.8));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    document.getElementById('addImage').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;
      resizeImage(file, 800, function(data) {
        addImageData = data;
        document.getElementById('addImagePreview').src = data;
        document.getElementById('addImagePreview').style.display = 'block';
        document.getElementById('addImageClear').style.display = 'inline-block';
        document.getElementById('addImageLabel').textContent = 'CHANGE IMAGE';
      });
    });

    document.getElementById('addImageClear').addEventListener('click', function() {
      addImageData = '';
      document.getElementById('addImage').value = '';
      document.getElementById('addImagePreview').style.display = 'none';
      document.getElementById('addImageClear').style.display = 'none';
      document.getElementById('addImageLabel').textContent = 'CHOOSE IMAGE';
    });

    function load() {
      fetch('/api/projects').then(function(r) { return r.json(); }).then(function(data) {
        projects = data.projects || [];
        render();
      });
    }

    function render() {
      var el = document.getElementById('projects');
      document.getElementById('count').textContent = projects.length + ' SITES';

      if (projects.length === 0) {
        el.innerHTML = '<div class="empty">NO SITES</div>';
        return;
      }

      el.innerHTML = projects.map(function(p, i) {
        if (i === editingIndex) {
          var hasImg = p.image || false;
          return '<div class="edit-row">' +
            '<div class="edit-fields">' +
              '<div class="field"><label>NAME</label><input type="text" id="editName" value="' + esc(p.name) + '"></div>' +
              '<div class="field"><label>URL</label><input type="url" id="editUrl" value="' + esc(p.url) + '"></div>' +
              '<div class="field"><label>GITHUB</label><input type="url" id="editGithub" value="' + esc(p.github || '') + '"></div>' +
            '</div>' +
            '<div class="field"><label>DESCRIPTION</label><textarea id="editDesc" rows="2">' + esc(p.description || '') + '</textarea></div>' +
            '<div class="img-row">' +
              '<div class="field"><label>IMAGE</label>' +
                '<input type="file" accept="image/*" class="img-upload" id="editImage">' +
                '<label for="editImage" class="img-label" id="editImageLabel">' + (hasImg ? 'CHANGE IMAGE' : 'CHOOSE IMAGE') + '</label>' +
              '</div>' +
              (hasImg ? '<img id="editImagePreview" class="img-preview" src="' + esc(p.image) + '">' : '<img id="editImagePreview" class="img-preview" style="display:none">') +
              '<button type="button" class="img-clear" style="' + (hasImg ? '' : 'display:none') + '" onclick="clearEditImage()">CLEAR</button>' +
            '</div>' +
            '<div class="edit-actions">' +
              '<button class="btn" onclick="saveEdit(' + i + ')">SAVE</button>' +
              '<button class="btn-outline" onclick="cancelEdit()">CANCEL</button>' +
            '</div>' +
          '</div>';
        }
        var img = p.image ? '<img src="' + esc(p.image) + '" class="project-img">' : '';
        var gh = p.github ? '<div class="project-github">' + esc(p.github) + '</div>' : '';
        var desc = p.description ? '<div class="project-desc">' + esc(p.description) + '</div>' : '';
        return '<div class="project">' +
          img +
          '<div class="project-info">' +
            '<div class="project-name">' + esc(p.name) + '</div>' +
            '<div class="project-url">' + esc(p.url) + '</div>' +
            gh + desc +
          '</div>' +
          '<div class="project-actions">' +
            '<button class="btn-outline" onclick="startEdit(' + i + ')">EDIT</button>' +
            '<button class="btn-outline" onclick="remove(' + i + ')">REMOVE</button>' +
          '</div>' +
        '</div>';
      }).join('');

      if (editingIndex >= 0) {
        editImageData = null;
        var editInput = document.getElementById('editImage');
        if (editInput) {
          editInput.addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            resizeImage(file, 800, function(data) {
              editImageData = data;
              var prev = document.getElementById('editImagePreview');
              prev.src = data;
              prev.style.display = 'block';
              prev.nextElementSibling.style.display = 'inline-block';
              document.getElementById('editImageLabel').textContent = 'CHANGE IMAGE';
            });
          });
        }
      }
    }

    function clearEditImage() {
      editImageData = '';
      var prev = document.getElementById('editImagePreview');
      prev.style.display = 'none';
      prev.nextElementSibling.style.display = 'none';
      document.getElementById('editImage').value = '';
      document.getElementById('editImageLabel').textContent = 'CHOOSE IMAGE';
    }

    document.getElementById('addBtn').addEventListener('click', function() {
      var name = document.getElementById('addName').value.trim();
      var url = document.getElementById('addUrl').value.trim();
      var github = document.getElementById('addGithub').value.trim();
      var description = document.getElementById('addDesc').value.trim();
      if (!name || !url) return;
      var btn = document.getElementById('addBtn');
      btn.disabled = true; btn.textContent = 'ADDING...';
      fetch('/api/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, url: url, github: github, description: description, image: addImageData })
      }).then(function() {
        document.getElementById('addName').value = '';
        document.getElementById('addUrl').value = '';
        document.getElementById('addGithub').value = '';
        document.getElementById('addDesc').value = '';
        addImageData = '';
        document.getElementById('addImage').value = '';
        document.getElementById('addImagePreview').style.display = 'none';
        document.getElementById('addImageClear').style.display = 'none';
        document.getElementById('addImageLabel').textContent = 'CHOOSE IMAGE';
        btn.disabled = false; btn.textContent = 'ADD';
        load();
      });
    });

    function startEdit(i) {
      editingIndex = i;
      editImageData = null;
      render();
    }

    function cancelEdit() {
      editingIndex = -1;
      editImageData = null;
      render();
    }

    function saveEdit(i) {
      var name = document.getElementById('editName').value.trim();
      var url = document.getElementById('editUrl').value.trim();
      var github = document.getElementById('editGithub').value.trim();
      var description = document.getElementById('editDesc').value.trim();
      if (!name || !url) return;
      var payload = { index: i, name: name, url: url, github: github, description: description };
      if (editImageData !== null) payload.image = editImageData;
      fetch('/api/projects', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(function() {
        editingIndex = -1;
        editImageData = null;
        load();
      });
    }

    function remove(i) {
      if (!confirm('REMOVE THIS SITE?')) return;
      fetch('/api/projects', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ index: i })
      }).then(function() { load(); });
    }
  </script>
</body>
</html>
